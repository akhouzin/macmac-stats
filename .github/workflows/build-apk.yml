name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install Capacitor
        run: npm install

      - name: Prepare web files
        run: |
          mkdir -p www
          cp index.html www/
          cp icon.png www/
          cp logo.png www/
          cp manifest.json www/

      - name: Add Android platform
        run: npx cap add android

      - name: Set MAC MAC icon
        run: |
          declare -A SIZES=(["mdpi"]=48 ["hdpi"]=72 ["xhdpi"]=96 ["xxhdpi"]=144 ["xxxhdpi"]=192)
          for dir in "${!SIZES[@]}"; do
            size=${SIZES[$dir]}
            base="android/app/src/main/res/mipmap-$dir"
            convert icon.png -resize ${size}x${size} "$base/ic_launcher.png"
            convert icon.png -resize ${size}x${size} "$base/ic_launcher_round.png"
            [ -f "$base/ic_launcher_foreground.png" ] && \
              convert icon.png -resize ${size}x${size} "$base/ic_launcher_foreground.png" || true
          done

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MAC-MAC-Stats
          path: android/app/build/outputs/apk/debug/app-debug.apk
