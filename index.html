<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MAC MAC Stats">
<meta name="theme-color" content="#F5A900">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<title>MAC MAC — Stats</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #faf6ee; --card: #ffffff; --text: #1a1200; --text-dim: #6b4e00;
    --border: rgba(180,130,0,0.18); --amber: #F5A900; --amber-dark: #c98400;
    --amber-light: #fff3c8; --amber-mid: #fdf5e0; --red: #c0392b;
    --shadow: 0 4px 20px rgba(180,120,0,0.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html { overflow-x:hidden; }
  body { background:var(--bg); color:var(--text); font-family:'Lato',sans-serif; min-height:100vh; padding-bottom:calc(72px + env(safe-area-inset-bottom)); overflow-x:hidden; max-width:100vw; }

  .topbar { background:var(--card); border-bottom:2px solid var(--amber); padding:10px 16px; padding-top:calc(10px + env(safe-area-inset-top)); display:flex; align-items:center; justify-content:space-between; z-index:100; box-shadow:var(--shadow); gap:10px; }
  .topbar-logo { width:46px; height:46px; object-fit:contain; flex-shrink:0; }
  .topbar-brand { font-family:'Cinzel Decorative','Cinzel',serif; font-size:15px; font-weight:700; letter-spacing:2px; color:var(--text); }
  .topbar-sub { font-family:'Cinzel',serif; font-size:9px; color:var(--text-dim); letter-spacing:4px; text-transform:uppercase; margin-top:1px; }
  .topbar-right { text-align:right; flex-shrink:0; }
  .topbar-time { font-family:'Cinzel',serif; font-size:11px; color:var(--text-dim); }
  .live-row { display:flex; align-items:center; justify-content:flex-end; gap:6px; }
  .live-dot { display:inline-block; width:7px; height:7px; background:var(--amber); border-radius:50%; margin-right:4px; }
  .live-dot.pulse { animation:pulse 1.5s infinite; }
  .live-status { font-family:'Cinzel',serif; font-size:10px; color:var(--text-dim); }
  .settings-btn { background:none; border:none; font-size:15px; cursor:pointer; opacity:0.5; padding:2px 4px; line-height:1; }
  .settings-btn:active { opacity:1; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .bottom-nav { position:fixed; bottom:0; left:0; right:0; z-index:200; background:var(--card); border-top:2px solid var(--amber); display:flex; padding-bottom:env(safe-area-inset-bottom); box-shadow:0 -2px 16px rgba(180,120,0,0.10); }
  .bnav-tab { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:8px 6px 6px; border:none; background:transparent; cursor:pointer; color:var(--text-dim); font-family:'Cinzel',serif; font-size:8px; font-weight:600; letter-spacing:1px; gap:3px; transition:color 0.15s; text-transform:uppercase; touch-action:manipulation; min-width:44px; }
  .bnav-tab.active { color:var(--amber-dark); }
  .bnav-icon { font-size:20px; line-height:1; transition:transform 0.15s; }
  .bnav-tab.active .bnav-icon { transform:scale(1.15); }
  .bnav-tab:active { opacity:0.6; }

  .pages-wrap { overflow:hidden; width:100%; }
  .pages-slider { display:flex; will-change:transform; }
  .page { min-width:100vw; max-width:100vw; padding:16px; flex-shrink:0; overflow-x:hidden; }

  .card { background:var(--card); border-radius:12px; padding:16px; margin-bottom:12px; box-shadow:var(--shadow); border:1px solid var(--border); max-width:100%; overflow:hidden; }
  .card-title { font-family:'Cinzel',serif; font-size:10px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--amber-dark); margin-bottom:12px; }

  .kpi-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
  .kpi { background:linear-gradient(145deg, var(--amber-mid), var(--amber-light)); border-radius:12px; padding:14px; box-shadow:var(--shadow); border:1px solid var(--border); }
  .kpi-label { font-family:'Cinzel',serif; font-size:9px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:var(--amber-dark); margin-bottom:4px; }
  .kpi-value { font-family:'Cormorant Garamond',serif; font-size:26px; font-weight:700; color:var(--text); line-height:1; }
  .kpi-value.amber { color:var(--amber-dark); }
  .kpi-sub { font-size:11px; color:var(--text-dim); margin-top:3px; }

  .day-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .day-nav-btn { background:var(--card); border:1px solid var(--border); border-radius:8px; width:36px; height:36px; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--amber-dark); transition:all 0.15s; }
  .day-nav-btn:disabled { opacity:0.3; cursor:default; }
  .day-label { font-family:'Cinzel',serif; font-size:13px; font-weight:600; text-align:center; letter-spacing:1px; }
  .day-sub { font-size:11px; color:var(--amber-dark); text-align:center; font-weight:700; }

  .row { display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-bottom:1px solid var(--border); }
  .row:last-child { border-bottom:none; }
  .row-name { font-family:'Cormorant Garamond',serif; font-size:15px; font-weight:600; }
  .row-sub { font-size:11px; color:var(--text-dim); }
  .row-right { text-align:right; }
  .row-val { font-size:13px; font-weight:700; color:var(--text); }
  .row-dim { font-size:11px; color:var(--text-dim); }

  .rank { display:inline-block; background:var(--text); color:#fff; font-size:10px; font-weight:700; border-radius:50%; width:20px; height:20px; text-align:center; line-height:20px; margin-right:8px; flex-shrink:0; }
  .rank.r1 { background:#b8860b; } .rank.r2 { background:#888; } .rank.r3 { background:#a07040; }

  .bar-wrap { background:var(--amber-light); border-radius:4px; height:5px; margin-top:5px; }
  .bar-fill { background:var(--amber); border-radius:4px; height:5px; transition:width 0.4s; }

  .cons-row { display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid var(--border); font-size:13px; }
  .cons-row:last-child { border-bottom:none; }
  .cons-label { color:var(--text-dim); } .cons-val { font-weight:700; color:var(--text); }

  .rec-summary-bar { position:fixed; left:0; right:0; bottom:calc(72px + env(safe-area-inset-bottom)); background:var(--card); border-top:2px solid var(--amber); border-radius:14px 14px 0 0; box-shadow:0 -4px 20px rgba(180,120,0,0.12); padding:10px 16px 8px; z-index:140; display:none; }
  body.rec-bar-active #page-recette { padding-bottom:calc(140px + 72px + env(safe-area-inset-bottom)); }
  .rec-bar-cols { display:flex; align-items:center; justify-content:space-around; gap:4px; }
  .rec-bar-item { text-align:center; flex:1; }
  .rec-bar-label { font-family:'Cinzel',serif; font-size:8px; letter-spacing:0.5px; color:var(--text-dim); text-transform:uppercase; margin-bottom:2px; }
  .rec-bar-val { font-family:'Cormorant Garamond',serif; font-size:17px; font-weight:700; line-height:1; }
  .rec-bar-sep { font-size:18px; color:var(--text-dim); font-weight:300; padding:0 2px; }
  .rec-sheet-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; margin:0 -2px; }
  .rec-sheet-table { border-collapse:collapse; font-size:11px; width:100%; background:#fff; }
  .rec-th-day { font-family:'Cinzel',serif; font-size:8px; letter-spacing:0.5px; text-align:left; padding:6px 8px; background:#f5f0e8; border:1px solid #ddd; position:sticky; left:0; z-index:2; white-space:nowrap; }
  .rec-th { font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.5px; text-align:center; padding:6px 4px; background:#f5f0e8; border:1px solid #ddd; white-space:nowrap; min-width:64px; }
  .rec-td-day { font-size:10px; padding:4px 8px; white-space:nowrap; border:1px solid #ddd; font-weight:600; position:sticky; left:0; background:inherit; z-index:1; }
  .rec-tr-today { background:#fffde7 !important; }
  .rec-tr-weekend .rec-td-day { color:var(--red); }
  .rec-cell { text-align:center; padding:5px 4px; font-size:11px; font-weight:700; border:1px solid #ddd; white-space:nowrap; }
  .rec-charge-cell { padding:2px 3px; border:1px solid #ddd; background:#fff; }
  .rec-charge-input { width:62px; border:none; background:transparent; font-size:12px; font-weight:600; color:var(--red); text-align:center; font-family:'Lato',sans-serif; outline:none; padding:3px 0; }
  .rec-charge-input:focus { background:var(--amber-light); border-radius:4px; }
  .rec-charge-input::placeholder { color:#ccc; font-weight:400; }
  .rec-add-form { background:var(--amber-mid); border-radius:10px; padding:14px; margin-bottom:12px; border:1px solid var(--border); }
  .rec-form-row { display:flex; gap:8px; align-items:flex-end; flex-wrap:wrap; }
  .rec-text-input { flex:1; min-width:120px; padding:8px 10px; border:1px solid var(--border); border-radius:8px; font-size:14px; font-family:'Lato',sans-serif; background:var(--card); color:var(--text); }
  .rec-text-input:focus { outline:none; border-color:var(--amber); }
  .rec-add-btn { background:var(--amber); color:#fff; border:none; border-radius:8px; padding:8px 14px; font-family:'Cinzel',serif; font-size:10px; font-weight:600; cursor:pointer; letter-spacing:1px; white-space:nowrap; }
  .rec-cancel-btn { background:none; border:1px solid var(--border); border-radius:8px; padding:8px 12px; font-size:11px; color:var(--text-dim); cursor:pointer; }

  .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:490; }
  .modal-box { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:var(--card); border-radius:16px; padding:20px; width:min(340px,92vw); box-shadow:0 8px 32px rgba(0,0,0,0.18); z-index:500; display:flex; flex-direction:column; gap:12px; }
  .modal-title { font-family:'Cinzel',serif; font-size:11px; letter-spacing:2px; color:var(--amber-dark); text-transform:uppercase; text-align:center; }
  .modal-label { font-family:'Cinzel',serif; font-size:9px; letter-spacing:1px; color:var(--text-dim); text-transform:uppercase; margin-bottom:4px; }
  .modal-input { width:100%; padding:10px; border:1px solid var(--border); border-radius:8px; font-size:14px; font-family:'Lato',sans-serif; background:var(--amber-mid); color:var(--text); outline:none; }
  .modal-input:focus { border-color:var(--amber); }
  .modal-btns { display:flex; gap:8px; justify-content:center; }
  .modal-confirm { background:var(--amber); color:#fff; border:none; border-radius:8px; padding:9px 20px; font-family:'Cinzel',serif; font-size:10px; letter-spacing:1px; cursor:pointer; }
  .modal-confirm:disabled { opacity:0.5; cursor:default; }
  .modal-cancel { background:none; color:var(--text-dim); border:1px solid var(--border); border-radius:8px; padding:9px 14px; font-size:10px; cursor:pointer; }
  .setup-field { display:flex; flex-direction:column; gap:4px; }

  .live-order { background:var(--amber-mid); border-radius:8px; padding:10px 12px; margin-bottom:8px; border-left:3px solid var(--amber); }
  .scroll-list { max-height:55vh; overflow-y:auto; -webkit-overflow-scrolling:touch; }
  .live-order-top { display:flex; justify-content:space-between; font-size:12px; font-weight:700; margin-bottom:4px; }
  .live-order-items { font-size:12px; color:var(--text-dim); }

  .empty { text-align:center; padding:40px 20px; color:var(--text-dim); font-size:14px; font-style:italic; }
  .loading { text-align:center; padding:60px 20px; color:var(--text-dim); font-size:14px; }
  .spinner { display:inline-block; width:24px; height:24px; border:3px solid var(--border); border-top-color:var(--amber); border-radius:50%; animation:spin 0.7s linear infinite; margin-bottom:10px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .today-tag { display:inline-block; background:var(--amber); color:#fff; font-family:'Cinzel',serif; font-size:8px; letter-spacing:1px; padding:2px 8px; border-radius:10px; margin-left:8px; vertical-align:middle; }
  .rapport-tabs { display:flex; gap:6px; margin-bottom:12px; }
  .rtab { flex:1; padding:9px 6px; border:1px solid var(--border); border-radius:10px; background:var(--card); font-family:'Cinzel',serif; font-size:9px; letter-spacing:1px; color:var(--text-dim); cursor:pointer; text-transform:uppercase; touch-action:manipulation; }
  .rtab.active { background:var(--amber); color:#fff; border-color:var(--amber); }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div style="display:flex;align-items:center;gap:10px;">
    <img src="logo.png" class="topbar-logo" alt="MAC MAC">
    <div>
      <div class="topbar-brand">MAC MAC</div>
      <div class="topbar-sub">Statistiques</div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="live-row">
      <div><span class="live-dot pulse" id="live-dot"></span><span class="live-status" id="live-status">Chargement…</span></div>
    </div>
    <div class="topbar-time" id="clock" style="margin-top:2px;"></div>
  </div>
</div>

<!-- PAGES -->
<div class="pages-wrap" id="pages-wrap">
<div class="pages-slider" id="pages-slider">

<!-- PAGE 0: RAPPORT -->
<div class="page" id="page-rapport">
  <div class="day-nav">
    <button class="day-nav-btn" id="t-prev" onclick="changeDay(1)">‹</button>
    <div><div class="day-label" id="t-day-label">—</div><div class="day-sub" id="t-day-sub"></div></div>
    <button class="day-nav-btn" id="t-next" onclick="changeDay(-1)" disabled>›</button>
  </div>
  <div id="tableau-loading" class="loading"><div class="spinner"></div><br>Chargement…</div>

  <!-- Sub-tab switcher (hidden until data loads) -->
  <div class="rapport-tabs" id="rapport-tabs" style="display:none;">
    <button class="rtab active" id="rtab-0" onclick="showRapportTab(0)">Café &amp; Bar</button>
    <button class="rtab" id="rtab-1" onclick="showRapportTab(1)">Restaurent</button>
  </div>

  <!-- Tab 0: KPIs + Par Serveur + Articles (non-restaurant) -->
  <div id="rapport-tab-0">
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-label">Commandes</div><div class="kpi-value amber" id="t-orders">—</div></div>
      <div class="kpi"><div class="kpi-label">Total du jour</div><div class="kpi-value amber" id="t-revenue">—</div><div class="kpi-sub">Dhs</div></div>
      <div class="kpi"><div class="kpi-label">Panier Moyen</div><div class="kpi-value" id="t-avg">—</div><div class="kpi-sub">Dhs / commande</div></div>
      <div class="kpi"><div class="kpi-label">Articles vendus</div><div class="kpi-value" id="t-items">—</div><div class="kpi-sub">unités</div></div>
    </div>
    <div class="card"><div class="card-title">Par Serveur</div><div id="t-servers"></div></div>
    <div class="card"><div class="card-title">Articles vendus — Café &amp; Bar</div><div id="t-top-items" class="scroll-list"></div></div>
  </div>

  <!-- Tab 1: Articles vendus Restaurent only -->
  <div id="rapport-tab-1" style="display:none;">
    <div class="card"><div class="card-title">Articles vendus — Restaurent</div><div id="t-resto-items" class="scroll-list"></div></div>
  </div>
</div>

<!-- PAGE 1: COMMANDES -->
<div class="page" id="page-commandes">
  <div class="day-nav">
    <button class="day-nav-btn" id="c-prev" onclick="changeCmd(1)">‹</button>
    <div><div class="day-label" id="c-day-label">—</div><div class="day-sub" id="c-day-sub"></div></div>
    <button class="day-nav-btn" id="c-next" onclick="changeCmd(-1)" disabled>›</button>
  </div>
  <div id="commandes-loading" class="loading"><div class="spinner"></div><br>Chargement…</div>
  <div id="commandes-content" style="display:none;">
    <div class="card"><div class="card-title" id="c-card-title">Commandes</div><div id="c-list" class="scroll-list"></div></div>
  </div>
</div>

<!-- PAGE 2: RECETTES -->
<div class="page" id="page-recette">
  <div class="day-nav" style="margin-bottom:12px;">
    <button class="day-nav-btn" id="rec-prev" onclick="changeRecMonth(-1)">‹</button>
    <div><div class="day-label" id="rec-month-label">—</div></div>
    <button class="day-nav-btn" id="rec-next" onclick="changeRecMonth(1)">›</button>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
    <span style="font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;">Charges</span>
    <button class="rec-add-btn" onclick="toggleRecForm()">+ Ajouter</button>
  </div>
  <div class="rec-add-form" id="rec-add-form" style="display:none;">
    <div style="font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;color:var(--amber-dark);margin-bottom:8px;">NOUVELLE CHARGE</div>
    <div class="rec-form-row">
      <input class="rec-text-input" id="rec-new-name" type="text" placeholder="Nom de la charge">
      <button class="rec-add-btn" onclick="addCharge()">Ajouter</button>
      <button class="rec-cancel-btn" onclick="toggleRecForm()">Annuler</button>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Recette & Charges</div>
    <div class="rec-sheet-wrap"><table class="rec-sheet-table" id="rec-sheet"></table></div>
  </div>
</div>

</div>
</div>

<!-- RECETTE SUMMARY BAR -->
<div class="rec-summary-bar" id="rec-summary-bar"><div id="rec-summary-card"></div></div>

<!-- REC MODAL -->
<div id="rec-modal" style="display:none;">
  <div class="modal-backdrop" onclick="closeRecModal()"></div>
  <div class="modal-box">
    <div class="modal-title" id="rec-modal-title"></div>
    <div id="rec-modal-input-wrap" style="display:none;">
      <input id="rec-modal-input" class="modal-input" type="text">
    </div>
    <div class="modal-btns">
      <button class="modal-confirm" onclick="confirmRecModal()">Confirmer</button>
      <button class="modal-cancel" onclick="closeRecModal()">Annuler</button>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="bnav-tab active" id="bnav-0"><span class="bnav-icon">📊</span><span>Rapport</span></button>
  <button class="bnav-tab" id="bnav-1"><span class="bnav-icon">🧾</span><span>Commandes</span></button>
  <button class="bnav-tab" id="bnav-2"><span class="bnav-icon">📋</span><span>Recettes</span></button>
</nav>

<script>
// ══════════════════════════════════════
// CONFIG — stored in localStorage on phone
// ══════════════════════════════════════
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVnYml0d2drbnRpY3FhdnR2c2l5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MDQxNzgsImV4cCI6MjA5MDE4MDE3OH0.12YsG41tTNf1M0VhHiKGgmDxBtfeYIdDDJD-KOgLATA';
const SB_URL   = 'https://egbitwgknticqavtvsiy.supabase.co';
const SB_EMAIL = 'macmac@pos.app';
const SB_PASS  = 'posmacmac2026';

let sb = null;
let sbUserId = null;
const _authReady = (async () => {
  sb = window.supabase.createClient(SB_URL, SUPABASE_ANON_KEY, { auth: { storageKey: 'mm_stats_auth', persistSession: false } });
  const { data, error } = await sb.auth.signInWithPassword({ email: SB_EMAIL, password: SB_PASS });
  if (error) throw error;
  sbUserId = data?.user?.id || null;
})();

// ══════════════════════════════════════
// CACHE
// ══════════════════════════════════════
function saveCache(ordersRaw, cancelledRaw) {
  try {
    localStorage.setItem('mm_cache_orders',    JSON.stringify(ordersRaw));
    localStorage.setItem('mm_cache_cancelled', JSON.stringify(cancelledRaw));
    localStorage.setItem('mm_cache_time',      Date.now().toString());
  } catch(e) {}
}
function loadCache() {
  try {
    return {
      orders:    JSON.parse(localStorage.getItem('mm_cache_orders')    || '[]'),
      cancelled: JSON.parse(localStorage.getItem('mm_cache_cancelled') || '[]'),
      time:      parseInt(localStorage.getItem('mm_cache_time')        || '0'),
    };
  } catch { return { orders: [], cancelled: [], time: 0 }; }
}

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let allOrders = [], _charges = [], _chargeDays = {};
let dayOffset = 0, cmdDayOffset = 0, recMonthOffset = 0;
let _recSummaryState = { totalRec: 0, totalChg: 0 };
let _recModalCallback = null;
let _menuItemCats = {}; // itemName → category, populated from Supabase
let rapportTab = 0;
const RESTO_CATS = new Set(['Pizzas','Tacos & Burgers','Pasticcio & Pasta','Sandwichs & Paninis','Cuisine Marocaine','Salades & Accompagnements']);

// ══════════════════════════════════════
// HELPERS
// ══════════════════════════════════════
function getDayKey(date) {
  return date.toLocaleDateString('fr-MA', { year:'numeric', month:'2-digit', day:'2-digit', timeZone:'Africa/Casablanca' });
}
function getRecDayKey(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}
const fmtMoney = n => n.toFixed(2);
const fmtTime  = d => d.toLocaleTimeString('fr-MA', { hour:'2-digit', minute:'2-digit', timeZone:'Africa/Casablanca' });
const fmtDate  = d => d.toLocaleDateString('fr-FR', { weekday:'long', day:'2-digit', month:'long', year:'numeric', timeZone:'Africa/Casablanca' });

function orderIdentity(row) {
  const time = row?.time ? String(row.time) : '';
  return `${row?.num ?? ''}__${time}`;
}

function dedupeByIdentity(rows) {
  const seen = new Set();
  const deduped = [];
  for (const row of rows || []) {
    const key = orderIdentity(row);
    if (seen.has(key)) continue;
    seen.add(key);
    deduped.push(row);
  }
  return deduped;
}

function formatAgo(ts) {
  const mins = Math.floor((Date.now() - ts) / 60000);
  if (mins < 1)  return "à l'instant";
  if (mins < 60) return 'il y a ' + mins + 'min';
  const h = Math.floor(mins / 60);
  return 'il y a ' + h + 'h' + (mins % 60 > 0 ? (mins % 60) + 'm' : '');
}

function getUniqueDays(orders) {
  const days = new Set(orders.map(o => getDayKey(o.time)));
  return [...days].sort((a, b) => {
    const pa = a.split('/'), pb = b.split('/');
    return new Date(pb[2], pb[1]-1, pb[0]) - new Date(pa[2], pa[1]-1, pa[0]);
  });
}
function parseDay(key) { const p = key.split('/'); return new Date(p[2], p[1]-1, p[0]); }

function calcConsumption(orders) {
  const coffeeKw = ['espresso','café','cafe','nespresso','latte','cappuccino','iced','frappuccino'];
  const milkKw   = ['lait','latte','cappuccino','creme','viennoise','chocolat','ness ness'];
  let water=0, coffeeG=0, milkCl=0, theG=0, water50=0, oulmes=0, oulmesFr=0;
  orders.forEach(o => o.items.forEach(item => {
    const nl = item.name.toLowerCase();
    if (!['Espresso Sans eau','Thé Marocain sans eau','Lait froid'].includes(item.name)
        && (coffeeKw.some(k=>nl.includes(k)) || nl.includes('thé') || nl.includes('infusion')))
      water += item.qty;
    if (coffeeKw.some(k=>nl.includes(k))) coffeeG += item.qty * 10;
    if (milkKw.some(k=>nl.includes(k)))   milkCl  += item.qty * 10;
    if (item.name === 'Thé Marocain')        theG     += item.qty * 5;
    if (item.name === 'Eau minérale 50CL')   water50  += item.qty;
    if (item.name === 'Eau gazeuse Oulmes')  oulmes   += item.qty;
    if (item.name === 'Eau Oulmes fruitées') oulmesFr += item.qty;
  }));
  return { water, coffeeG, milkCl, theG, water50, oulmes, oulmesFr };
}

// SUPABASE FETCH
// ══════════════════════════════════════
async function fetchAllOrders() {
  const PAGE = 1000;
  if (!sbUserId) throw new Error('Auth utilisateur requise');
  const { count, error } = await sb.from('orders').select('*', { count:'exact', head:true }).eq('user_id', sbUserId);
  if (error) throw new Error(error.message);
  if (!count) return [];
  const pages = Math.ceil(count / PAGE);
  const results = await Promise.all(
    Array.from({ length: pages }, (_, i) =>
      sb.from('orders').select('*').eq('user_id', sbUserId).order('time', { ascending:false }).range(i*PAGE, (i+1)*PAGE-1)
    )
  );
  return dedupeByIdentity(results.flatMap(r => r.data || []));
}

// ══════════════════════════════════════
// APPLY DATA
// ══════════════════════════════════════
function applyData(ordersRaw, cancelledRaw, chargesData, chargeDaysData) {
  const cancelledKeys = new Set(dedupeByIdentity(cancelledRaw).map(orderIdentity));
  allOrders = dedupeByIdentity(ordersRaw)
    .filter(r => !cancelledKeys.has(orderIdentity(r)))
    .map(r => ({ ...r, items: typeof r.items === 'string' ? JSON.parse(r.items) : r.items, time: new Date(new Date(r.time.replace(' ', 'T').replace(/\+00$/, 'Z')).getTime() + 3600 * 1000) }));
  _charges = chargesData || [];
  _chargeDays = {};
  (chargeDaysData || []).forEach(r => {
    if (!_chargeDays[r.charge_id]) _chargeDays[r.charge_id] = {};
    _chargeDays[r.charge_id][r.day_key] = r.amount;
  });
  document.getElementById('tableau-loading').style.display   = 'none';
  document.getElementById('commandes-loading').style.display = 'none';
  document.getElementById('commandes-content').style.display = 'block';
  renderPage(currentPage);
}

// ══════════════════════════════════════
// LOAD DATA
// ══════════════════════════════════════
async function loadData() {
  // Show cache instantly
  const cache = loadCache();
  if (cache.time > 0) {
    applyData(cache.orders, cache.cancelled, _charges, flattenChargeDays(_chargeDays));
    setStatus('offline', 'Cache — ' + formatAgo(cache.time));
  } else {
    setStatus('loading', 'Connexion…');
  }

  try {
    const [cancelledRes, allRaw, chargesRes, chargeDaysRes, menuItemsRes] = await Promise.all([
      sb.from('cancelled_orders').select('num,time').eq('user_id', sbUserId),
      fetchAllOrders(),
      sb.from('rec_charges').select('*').order('created_at'),
      sb.from('rec_charge_days').select('*'),
      sb.from('menu_items').select('name,cat'),
    ]);
    const queryError = cancelledRes.error || chargesRes.error || chargeDaysRes.error;
    if (queryError) throw new Error(queryError.message);
    if (menuItemsRes.data) {
      _menuItemCats = {};
      menuItemsRes.data.forEach(i => { _menuItemCats[i.name] = i.cat; });
    }
    saveCache(allRaw, cancelledRes.data || []);
    applyData(allRaw, cancelledRes.data || [], chargesRes.data || [], chargeDaysRes.data || []);
    setStatus('online', 'En ligne');
  } catch(e) {
    if (cache.time > 0) {
      setStatus('offline', 'Cache — ' + formatAgo(cache.time));
    } else {
      setStatus('offline', e.message || 'Hors ligne');
      document.getElementById('tableau-loading').innerHTML =
        `<div style="color:var(--red);font-family:'Cinzel',serif;font-size:12px;letter-spacing:1px;">${e.message || 'Connexion échouée'}</div>`;
    }
  }
}

function flattenChargeDays(obj) {
  const rows = [];
  Object.entries(obj).forEach(([charge_id, days]) =>
    Object.entries(days).forEach(([day_key, amount]) => rows.push({ charge_id: Number(charge_id), day_key, amount }))
  );
  return rows;
}

setInterval(loadData, 60000);

const PAGE_COUNT = 3;

function showPage(idx) {
  currentPage = idx;
  slider.style.transition = 'transform 0.32s cubic-bezier(0.4,0,0.2,1)';
  slider.style.transform  = `translateX(${-idx * window.innerWidth}px)`;

  requestAnimationFrame(() => {
    document.querySelectorAll('.bnav-tab').forEach((t,i) => t.classList.toggle('active', i===idx));
    window.scrollTo(0, 0);
  });
  setTimeout(() => renderPage(idx), 330);
}
function renderPage(idx) {
  if (idx===0) renderTableau();
  if (idx===1) renderCommandes();
  if (idx===2) renderRecette();
}

// Swipe
(function() {
  let startX=0, startY=0, dragging=false, dirLocked=false, isHoriz=false;
  const wrap = document.getElementById('pages-wrap');
  const baseOffset = () => -currentPage * window.innerWidth;
  function insideHScroll(el) { while(el&&el!==wrap){ if(el.scrollWidth>el.clientWidth+2) return true; el=el.parentElement; } return false; }
  wrap.addEventListener('touchstart', e => {
    startX=e.touches[0].clientX; startY=e.touches[0].clientY;
    if(insideHScroll(e.target)){ dragging=false; return; }
    dragging=true; dirLocked=false; isHoriz=false; slider.style.transition='none';
  }, {passive:true});
  wrap.addEventListener('touchmove', e => {
    if(!dragging) return;
    const dx=e.touches[0].clientX-startX, dy=e.touches[0].clientY-startY;
    if(!dirLocked){ if(Math.abs(dx)>16||Math.abs(dy)>16){ isHoriz=Math.abs(dx)>Math.abs(dy)*2.2; dirLocked=true; } return; }
    if(!isHoriz) return;
    let off=baseOffset()+dx;
    if((currentPage===0&&dx>0)||(currentPage===PAGE_COUNT-1&&dx<0)) off=baseOffset()+dx*0.2;
    slider.style.transform=`translateX(${off}px)`;
  }, {passive:true});
  function onEnd(e) {
    if(!dragging) return; dragging=false; if(!isHoriz) return;
    const dx=(e.changedTouches?e.changedTouches[0].clientX:startX)-startX;
    const thr=window.innerWidth*0.30;
    if(dx<-thr&&currentPage<PAGE_COUNT-1) showPage(currentPage+1);
    else if(dx>thr&&currentPage>0) showPage(currentPage-1);
    else showPage(currentPage);
  }
  wrap.addEventListener('touchend',   onEnd, {passive:true});
  wrap.addEventListener('touchcancel',onEnd, {passive:true});
})();
document.querySelectorAll('.bnav-tab').forEach((btn,i) => {
  btn.addEventListener('touchend', e => { e.preventDefault(); showPage(i); }, {passive:false});
  btn.addEventListener('click', () => showPage(i));
});

function changeDay(dir) {
  const days=getUniqueDays(allOrders), todayKey=getDayKey(new Date());
  if(!days.includes(todayKey)) days.unshift(todayKey);
  dayOffset=Math.max(0,Math.min(days.length-1,dayOffset+dir));
  renderTableau();
}
function renderTableau() {
  const days=getUniqueDays(allOrders), todayKey=getDayKey(new Date());
  if(!days.includes(todayKey)) days.unshift(todayKey);
  dayOffset=Math.max(0,Math.min(days.length-1,dayOffset));
  const key=days[dayOffset], date=parseDay(key), isToday=key===todayKey;
  document.getElementById('t-day-label').textContent=fmtDate(date);
  document.getElementById('t-day-sub').textContent=isToday?"Aujourd'hui":'';
  document.getElementById('t-prev').disabled=dayOffset>=days.length-1;
  document.getElementById('t-next').disabled=dayOffset<=0;
  const orders=allOrders.filter(o=>getDayKey(o.time)===key).sort((a,b)=>a.time-b.time);
  const total=orders.reduce((s,o)=>s+o.total,0);
  const items=orders.reduce((s,o)=>s+o.items.reduce((ss,i)=>ss+i.qty,0),0);
  document.getElementById('t-orders').textContent=orders.length;
  document.getElementById('t-revenue').textContent=fmtMoney(total);
  document.getElementById('t-avg').textContent=orders.length?fmtMoney(total/orders.length):'0.00';
  document.getElementById('t-items').textContent=items;
  // Par serveur
  const srvMap={};
  orders.forEach(o=>{ const s=o.server||'—'; if(!srvMap[s]) srvMap[s]={count:0,total:0}; srvMap[s].count++; srvMap[s].total+=o.total; });
  document.getElementById('t-servers').innerHTML=Object.entries(srvMap).sort((a,b)=>b[1].total-a[1].total).map(([name,d])=>`
    <div class="row"><div><div class="row-name">${name}</div><div class="row-sub">${d.count} commande${d.count>1?'s':''}</div></div><div class="row-val">${fmtMoney(d.total)} Dhs</div></div>`).join('')||'<div class="empty">Aucune commande</div>';
  // Build item map then split into resto / non-resto
  const itemMap={};
  orders.forEach(o=>o.items.forEach(item=>{ if(!itemMap[item.name]) itemMap[item.name]={qty:0,rev:0}; itemMap[item.name].qty+=item.qty; itemMap[item.name].rev+=item.price*item.qty; }));
  const isResto=name=>RESTO_CATS.has(_menuItemCats[name]||'');
  const allSorted=Object.entries(itemMap).sort((a,b)=>b[1].rev-a[1].rev);
  const barSorted=allSorted.filter(([n])=>!isResto(n));
  const restoSorted=allSorted.filter(([n])=>isResto(n));
  const renderItems=(list,el)=>{
    const maxRev=list[0]?.[1].rev||1;
    document.getElementById(el).innerHTML=list.map(([name,d],i)=>`
      <div class="row"><div style="flex:1;"><div style="display:flex;align-items:center;">${i<3?`<span class="rank r${i+1}">${i+1}</span>`:`<span style="display:inline-block;width:28px;text-align:center;font-size:11px;color:var(--text-dim);">${i+1}</span>`}<div class="row-name">${name}</div></div>
      <div class="bar-wrap" style="margin-left:28px;"><div class="bar-fill" style="width:${(d.rev/maxRev*100).toFixed(0)}%"></div></div></div>
      <div class="row-right"><div class="row-val">×${d.qty}</div><div class="row-dim">${fmtMoney(d.rev)} Dhs</div></div></div>`).join('')||'<div class="empty">Aucun article vendu</div>';
  };
  renderItems(barSorted,'t-top-items');
  renderItems(restoSorted,'t-resto-items');
  // Show tabs now that content is ready
  document.getElementById('rapport-tabs').style.display='flex';
}

function getDayRevenue(dayKey) {
  const [y,m,d]=dayKey.split('-').map(Number);
  return allOrders.filter(o=>getDayKey(o.time)===getDayKey(new Date(y,m-1,d))).reduce((s,o)=>s+o.total,0);
}
function changeRecMonth(dir) { recMonthOffset=Math.min(0,Math.max(recMonthOffset+dir,-120)); renderRecette(); }
function toggleRecForm() {
  const f=document.getElementById('rec-add-form');
  f.style.display=f.style.display==='none'?'block':'none';
  if(f.style.display==='block') document.getElementById('rec-new-name').focus();
}
async function addCharge() {
  const name=document.getElementById('rec-new-name').value.trim(); if(!name||!sb) return;
  const {data,error}=await sb.from('rec_charges').insert({name}).select().single();
  if(error){ alert('Erreur: '+error.message); return; }
  _charges.push(data);
  document.getElementById('rec-new-name').value=''; toggleRecForm(); renderRecette();
}
function removeCharge(id) {
  openRecModal('Supprimer cette charge ?', false, async () => {
    if(!sb) return;
    await sb.from('rec_charge_days').delete().eq('charge_id',id);
    await sb.from('rec_charges').delete().eq('id',id);
    _charges=_charges.filter(c=>c.id!==id); delete _chargeDays[id]; renderRecette();
  });
}
function renameCharge(id) {
  const charge=_charges.find(c=>c.id===id); if(!charge) return;
  openRecModal('Renommer la charge', true, async val => {
    if(!val||!val.trim()||!sb) return;
    await sb.from('rec_charges').update({name:val.trim()}).eq('id',id);
    charge.name=val.trim(); renderRecette();
  }, charge.name);
}
async function setChargeAmount(chargeId, dayKey, amount) {
  if(!sb) return;
  const val=parseFloat(amount);
  if(!_chargeDays[chargeId]) _chargeDays[chargeId]={};
  if(isNaN(val)||val===0) {
    _chargeDays[chargeId][dayKey]=0;
    await sb.from('rec_charge_days').delete().eq('charge_id',chargeId).eq('day_key',dayKey);
  } else {
    _chargeDays[chargeId][dayKey]=val;
    await sb.from('rec_charge_days').upsert({charge_id:chargeId,day_key:dayKey,amount:val});
  }
  renderRecetteSummary();
}
function renderRecette() {
  const now=new Date(), td=new Date(now.getFullYear(),now.getMonth()+recMonthOffset,1);
  const ty=td.getFullYear(), tm=td.getMonth(), dim=new Date(ty,tm+1,0).getDate();
  const isCur=ty===now.getFullYear()&&tm===now.getMonth();
  const mp=`${ty}-${String(tm+1).padStart(2,'0')}-`;
  document.getElementById('rec-month-label').textContent=td.toLocaleDateString('fr-FR',{month:'long',year:'numeric'}).replace(/^\w/,c=>c.toUpperCase());
  document.getElementById('rec-prev').disabled=recMonthOffset<=-120;
  document.getElementById('rec-next').disabled=recMonthOffset>=0;
  const charges=_charges;
  let html='<thead><tr><th class="rec-th-day">Jour</th><th class="rec-th">Recette</th>';
  charges.forEach(c=>{ html+=`<th class="rec-th" style="cursor:pointer;" onclick="renameCharge(${c.id})">${c.name} <span onclick="event.stopPropagation();removeCharge(${c.id})" style="color:var(--red);cursor:pointer;font-size:10px;">✕</span></th>`; });
  html+='<th class="rec-th">Charges</th><th class="rec-th">Net</th></tr></thead><tbody>';
  let totalRec=0, totalChg=0;
  const lastDay=dim;
  for(let d=1;d<=lastDay;d++) {
    const dd=new Date(ty,tm,d), dk=getRecDayKey(ty,tm,d), dow=dd.getDay();
    const isW=dow===0||dow===6, isT=isCur&&d===now.getDate();
    const dl=dd.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric'});
    const rec=getDayRevenue(dk); totalRec+=rec;
    let rc=0; charges.forEach(c=>{ rc+=(_chargeDays[c.id]?.[dk]||0); }); totalChg+=rc;
    const net=rec-rc, tc=isT?'rec-tr-today':(isW?'rec-tr-weekend':'');
    html+=`<tr class="${tc}"><td class="rec-td-day">${dl}</td><td class="rec-cell" style="color:var(--amber-dark);">${rec>0?fmtMoney(rec):'—'}</td>`;
    charges.forEach(c=>{ const ex=_chargeDays[c.id]?.[dk]||''; html+=`<td class="rec-charge-cell"><input class="rec-charge-input" type="number" min="0" step="0.01" placeholder="0" value="${ex||''}" onchange="setChargeAmount(${c.id},'${dk}',this.value)"></td>`; });
    html+=`<td class="rec-cell" style="color:var(--red);">${rc>0?fmtMoney(rc):'—'}</td><td class="rec-cell" style="color:${net>=0?'var(--text)':'var(--red)'};">${fmtMoney(net)}</td></tr>`;
  }
  html+='<tr style="background:#f5f0e8;"><td class="rec-td-day" style="font-family:\'Cinzel\',serif;font-size:9px;font-weight:700;">TOTAL</td>';
  html+=`<td class="rec-cell" style="color:var(--amber-dark);font-weight:700;">${fmtMoney(totalRec)}</td>`;
  charges.forEach(c=>{ const ct=Object.entries(_chargeDays[c.id]||{}).filter(([dk])=>dk.startsWith(mp)).reduce((s,[,v])=>s+v,0); html+=`<td class="rec-cell" style="color:var(--red);font-weight:700;">${ct>0?fmtMoney(ct):'—'}</td>`; });
  const tn=totalRec-totalChg;
  html+=`<td class="rec-cell" style="color:var(--red);font-weight:700;">${fmtMoney(totalChg)}</td><td class="rec-cell" style="color:${tn>=0?'var(--text)':'var(--red)'};font-weight:700;">${fmtMoney(tn)}</td></tr></tbody>`;
  document.getElementById('rec-sheet').innerHTML=html;
  _recSummaryState={totalRec,totalChg}; renderRecetteSummary();
}
function renderRecetteSummary() {
  const {totalRec,totalChg}=_recSummaryState, net=totalRec-totalChg;
  document.getElementById('rec-summary-card').innerHTML=`
    <div class="rec-bar-cols">
      <div class="rec-bar-item"><div class="rec-bar-label">Recette</div><div class="rec-bar-val" style="color:var(--amber-dark);">${fmtMoney(totalRec)}</div></div>
      <div class="rec-bar-sep">−</div>
      <div class="rec-bar-item"><div class="rec-bar-label">Charges</div><div class="rec-bar-val" style="color:var(--red);">${fmtMoney(totalChg)}</div></div>
      <div class="rec-bar-sep">=</div>
      <div class="rec-bar-item"><div class="rec-bar-label">Net</div><div class="rec-bar-val" style="color:${net>=0?'var(--text)':'var(--red)'};">${fmtMoney(net)}</div></div>
    </div>`;
}
function openRecModal(title, hasInput, callback, defaultVal='') {
  _recModalCallback=callback;
  document.getElementById('rec-modal-title').textContent=title;
  const wrap=document.getElementById('rec-modal-input-wrap'), inp=document.getElementById('rec-modal-input');
  wrap.style.display=hasInput?'block':'none';
  if(hasInput){ inp.value=defaultVal; setTimeout(()=>inp.focus(),100); }
  document.getElementById('rec-modal').style.display='block';
}
function closeRecModal() { document.getElementById('rec-modal').style.display='none'; _recModalCallback=null; }
function confirmRecModal() {
  if(!_recModalCallback) return;
  const wrap=document.getElementById('rec-modal-input-wrap');
  const val=wrap.style.display!=='none'?document.getElementById('rec-modal-input').value:null;
  _recModalCallback(val); closeRecModal();
}

// ══════════════════════════════════════
// BOOT
// ══════════════════════════════════════
_authReady.then(() => loadData());
</script>
